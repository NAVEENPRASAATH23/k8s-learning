apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
  namespace: test
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app
        image: naveenprasaath2904/web-app:k8s
        ports:
        - containerPort: 3000
